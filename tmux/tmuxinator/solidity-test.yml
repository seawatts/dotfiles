# ~/.tmuxinator/solidity-test.yml

name: solidity-test
root: ~/src/github.com/glonky

windows:
  - webApp:
      layout: tiled
      panes:
        - localTestNet:
          - cd solidity-test
          - yarn local-testnet
        - compile:
          - cd solidity-test
          - yarn watch
        - test:
          - cd solidity-test
          - yarn test
        - console:
          - cd solidity-test
